version: 2.1

jobs:
  say-hello:
    docker:
      - image: cimg/base:current
    steps:
      - checkout
      - run:
          name: "Say hello"
          command: "echo Hello, World!"

  deploy:
    docker:
      - image: cimg/base:current
    steps:
      - checkout
      - run:
          name: Plan deployment
          command: |
            circleci run release plan deploy \
              --target-version="1.0.${CIRCLE_BUILD_NUM}-${CIRCLE_SHA1:0:7}" \
              --component-name="circleci-mcp-preview-app" \
              --environment-name="production"
      - run:
          name: Perform deployment
          command: echo "Deploying application..."
      - run:
          name: Update deployment to running
          command: circleci run release update deploy --status=running
      - run:
          name: Update deployment to SUCCESS
          command: circleci run release update deploy --status=SUCCESS
          when: on_success
      - run:
          name: Update deployment to FAILED
          command: circleci run release update deploy --status=FAILED
          when: on_fail

workflows:
  say-hello-workflow:
    jobs:
      - say-hello
      - deploy:
          requires:
            - say-hello
